front:
  text: 序吉益君為醫也稽古立極明今御方蓋其所祖述特在張仲景氏云乃至其發姦誅邪排固解難確乎不可拔凜乎不可動譬猶執針旄制閫外命也是以世之疑且懼者多矣而至衆工無措見以為遊魂行尸者得君能起則世不可以無君也平居謂為世之疑懼吐剛茹柔阿媚希售者奚其無特操乎且也豫生之初裸蟲耳藉令術之不行亦豈矣為裸蟲乎何媚世之為屬者其門人輯録師説命曰醫斷此書之行也疑且懼者亦益多矣而後識者左袒君也猶瞿圃之射焉爾長門瀧長愷彌八父序自序余自成童學醫鑽研其道者十年所於茲矣每病其諸説冰炭施治隔靴搔癢乙丑之秋遊於京師達觀於諸老先生之所為猶未足以解此惑也後僑居倉街與北奧孔澤氏相知遂締交莫逆膠漆以視孔澤氏學於東洞先生勸余執贄從學焉蓋先生之術一據仲景試以奏效其教明辨詳實行事為先諸空言虛論者斥之不言余侍帳前得聞其説則如冰解而炭灰如撤靴以搔癢前方病者惑者一掃都盡遂記其説輯以為一小册子求正於先生請評於諸友云延享丁卯冬十月西肥鶴沖元逸書於洛西僑居
