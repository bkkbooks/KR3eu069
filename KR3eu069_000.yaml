body:
  text: 醫斷司命古人謂醫為司命官者蓋本諸扁鵲之言是不知道者耳扁鵲之言曰疾在骨髓雖司命無奈之何是謂雖司命而不謂己為司命也可以見已夫死生有命也命者天之令也孔子之所罕言諸子之所不得聞也醫其如夫命何蓋醫者掌疾病者也謂之掌疾職則可矣謂司命官則所以誣扁鵲惑來學者莫斯為甚矣學者思諸死生死生者命也自天作之其唯自天作之醫焉能死生之哉故仁不能延勇不能奪智不能測醫不能救唯因疾病致死非命也毒藥所能治已蓋死生者醫之所不與也疾病者醫之所當治也故先生曰盡人事而待天命苟人事之不盡豈得委於命乎是故術之不明方之不中而致死者非命矣執古之方體今之病能合仲景之規矩而死者命也質諸鬼神吾無愧爾世醫動輒預定其死生彼其意謂斃於吾手則害於名矣間有一二中者益信其臆不爽也夫察聲氣色眂其死生周官所命也豈不可乎雖然察之以臆眂之以臆使其生者輒編之鬼籍恝乎束手以待其斃是豈仁人之用心乎故既眂其死猶且盡吾術以望其或生古之道也然而不生然後可謂命也已矣唯重其名故唯眂其死不能忘死生於執刀圭間所以惑也唯重其仁故唯眂其生所以世醫所謂死者間有起者也故曰死生者醫之所不與也元氣元氣之説聖人之所不言六經莫有焉蓋自漢儒創也下至唐宋大盛遂為醫之恆言曰元氣虛曰元氣衰曰補元氣夫元氣者陰陽一元氣也天之所賦人之所生所謂先天之氣也是豈可虛衰者哉亦豈可補乎哉若夫隨年齒而旺衰者天地之道萬物之常也非人力之所能挽回矣如其當強壯而衰弱者則有所抑遏也除其所抑遏者則自復其常矣彼不辨之妄以為虛衰而欲補之可謂愚矣又曰行氣則病自除蓋本之素問曰百病生於氣雖然病之者毒也毒乘之也豈氣特病乎又豈毒自除乎説者不論及此誤矣脈候人心之不同如其面也脈亦然古人以體肥瘦性緩急等為之規則然是説其大抵耳豈得人人而同乎醫謂人身之有脈猶地之有經水也知平生之脈病脈稍可知也而知其平生之脈者十之一二耳是以先生之教先證而不先脈先腹而不先證也扁鵲曰越人之為方也不待切脈望色聽聲寫形言病之所在可以見已且如留飲家脈千狀萬形或無或有不可得而詳矣夫脈之不足以證也如此然謂五動或五十動候五藏之氣者妄甚矣如其浮沉遲數滑澀僅可辨知耳三指舉按之間焉能辨所謂二十七脈者哉世有隱其病使醫診其脈以試之者乃恥其不知之似拙以意推度言其倣佛欲以中之自欺之甚矣醫其思諸腹候腹者有生之本故百病根於此焉是以診病必候其腹外證次之蓋有主腹狀焉者有主外證焉者因其所主各殊治法扁鵲曰病應見於大表仲景曰隨證而治之宜取古法而求其要矣臟腑周禮曰參之以九藏之動而不分腑也仲景未嘗論矣無益於治病也傷寒論中適有之然非仲景之口氣疑後世攙入也夫漢以降以五行配之以相剋推病且曰腎有二曰臟五而腑六曰臟六而腑五曰有命門有心包有三焦其説弗啻堅白要皆非治疾之用矣經絡十二經十五絡者言人身氣脈通行之道路醫家之所重也然無用乎治矣是以不取也如針灸法無一不可灸之穴無一不可刺之經所謂所生是動井榮俞經合等亦妄説耳不可從也引經報使本草曰某藥入某經某臟又曰某藥治某經病某藥某經之藥也某藥某臟之劑也其分別配合歷歷乎如可據者若其如此誰失正鵠然而不可以此治病則其為牽強可以知已古法唯因上下表里所主而處方不同焉耳針灸針灸之用一旦馳逐其病非無驗也唯除本斷根為難而已如痼毒灸之則動動而後攻之易治故針灸亦為一具而不必專用亦不拘經絡分數毒之所在灸之刺之是已榮衛榮衛者氣血之別稱也所謂榮行脈中衛行脈外行陽二十五度行陰二十五度亦理而已非疾醫之用也不可從矣陰陽陰陽者天地之氣也無取於醫矣如表裡為陰陽上下為陰陽猶可矣至如朱丹溪陽有餘張介賓陰有餘之説穿鑿甚矣後人執兩家之中以為得其所所謂子莫之中耳其他如六經陰陽不可強為之説非唯無益於治反以惑人學者思諸五行五行之説已見虞書及洪範下至漢儒熾言之素問難經欲由是以總天下之衆理窮人身之百病説之若符契然雖然要皆論説之言已今執其説施之匕術則致謬千里是吾黨所以不取也後人增演其説以誇窮理可謂無用之徒也已運氣五運六氣者無驗於病也考司天在泉推大過不及定寒熱溫涼按主病試應脈者無有其驗可謂迂矣要是陰陽家之言奚取於疾病醫乎理世之好言理者必物推事窮至其所不通鑿以誣之蓋理本非可惡者也惡其鑿焉耳故雖口能説百病之理而難其治者為其鑿也夫理無定準疾有定證豈可以無定準之理臨有定證之疾哉故吾黨論其已然者不論未然者又不論其所以然者蓋事理相依不離者也故事為而得之理默而識之醫意醫意之説一出而世之狡兒以為口實曰醫之道唯意以推之何必讀書受業而後為之邪籲妄哉陋哉豈可與言道哉蓋醫之為道自有一定法何鑿推妄行之為其如是也不由規矩以擬方圓不用繩墨而置曲直豈得不差乎學者思諸痼疾世醫以痼疾名持病而難乎治矣至如中風嗝噎脹滿痿躄等難之益甚是無它方不得法也蓋方法不愆焉則無病不愈也今從法處方其所難者得治不少矣彼已不能治則雖千百人中起一人不亦善乎此非入門同道不易論焉素難素靈二書古人以為先秦之偽作周南先生曰六朝以降之書然其中間有古語可法者學者擇焉難經傳以為越人書也而其言理最勝故害道亦多考之扁鵲傳亦唯偽作而已本草本草妄説甚多不足以徵也然至考藥功豈可廢乎宜擇其合於仲景法者用之至如延齡長生補元氣美顏色入水不溺白日見星殊不可信也其非炎帝書也不待辨而明矣後世服食家説攙入本經不可不擇焉修治後世修治之法甚煩如煨炮炒中黑微炒酒浸酢浸九蒸九曝等與作飲作餅為羹為胾之法何別乎去酷烈之本味偏性之毒氣以為鈍弱可狎之物何能除毒治病哉蓋毒即能能即毒制以蓋毒則可也殺毒則不可矣相畏相反相畏相反之説甚無謂也古人制方全不拘於此如甘草芫花未見其害也其他亦可以知已毒藥藥者草木偏性者也偏性之氣皆有毒以此毒除彼毒耳周禮曰聚毒藥以供醫事又曰以五毒攻之左傳曰美疢弗如惡石古語曰毒藥苦口利於病內經曰毒藥攻邪古者以藥為毒可以知已後世自道家之説混於疾醫從藥為補氣養生之物不知其為逐邪驅病之設也可謂失其本矣甚則至有延齡長年還少不死等之説庸愚信之煆煉服食以誤其身者多矣悲夫藥能諸家本草所説藥能率多謬妄故先生一皆考信於仲景氏云參觀其方功用可推也今舉本草所載不合仲景者一二如人參治心下痞硬而彼以為補氣石膏已渴而彼以為解熱附子逐水氣而彼以為溫寒其相齟齬者大抵為爾先生別撰藥徵以詳之故不贅於此藥産藥産有某土宜處某土不宜處其土之所生性之所稟不可不詳也人參人參有數種今觀清韓賈舶所載來者皆非古也蓋參本味苦治心下痞硬之物也仲景之書及千金外臺方中所用可見已自服食家之説行有補元氣益精力之言於是浸甘草汁甘其味加修飾美外形以炫貴價也人以為救死之良藥醫以為保生之極品承誤以傳眩贋而失真矣貧賤而死者以為不用參之尤富貴而斃者以為參不及救之唯遁辭於彼而已且今用之心下痞硬不治和參能治之是其由製造可以知也古方方者莫古於仲景而仲景為傳方之人非作方之人也蓋身為長沙太守博集群方施之當時以傳後世而其書具存焉故欲用古方者先讀其書方用可知然後藥能可知也未知方用焉能知藥能乎雖然未知藥能則方用亦不可知也況方意不可解者甚多矣蓋雖仲景亦或有不解者雖則或有不解者而昔人所傳既用有驗者又奚容疑焉降至千金外臺書方劑不古者居多其可取者不過數方而已概多味者可疑矣世有欲以數藥兼治數證者自謂無不中也亦唯暗投瞑行也已學者思諸名方世俗所謂名方者間有奇效故醫傳之非醫者亦傳之不審其所出而一時施用有驗者相傳以為名方也蓋載書籍者未必佳傳俗間者未必不佳宜博求普問以輔其術矣仲景書仲景書有傷寒雜病論金匱要略玉函經其論傷寒及雜病甚詳悉焉然如要略玉函偽撰已先生辨之故不贅也雖傷寒雜病論獨出於仲景然叔和撰次之加以己説方劑亦雜出失本色者往往有之且世遐時移謬誤錯亂非復叔和之舊不可不擇也後之注家皆為牽強附會不可從也故先生之教其理鑿者其説迂者一切不取之所以求其本色也學者宜審焉傷寒六經傷寒論六經非謂病在六經也假以為經也已及其施治也皆從證而不拘焉如後世謂某證在某經某經傳某經及誤下越經傳之説皆非矣不可從也病因後世以病因為治本也曰不知之焉得治豫嘗學其道恍惚不可分雖聖人難知之已然非謂無之也言知之皆想像也以想像為治本吾斯之未能信矣故先生以見證為治本不拘因也即仲景之法也今舉一二而徵焉中風頭痛發熱汗出者下利後頭痛發熱汗出者皆桂枝湯主之傷寒寒熱往來胸脅苦滿中風寒熱往來胸脅苦滿或瘧或腹痛或熱入血室有前證則皆小柴胡湯主之傷寒大煩渴中熱大煩渴皆白虎湯主之是雖異其因而方則同矣可見仲景從證不拘因也若不得止論之則有二矣飲食外邪是也雖然入口者不出飲食蓋留滯則為毒百病系焉諸證出焉在心下為痞在腹為脹在胸為冒在頭為痛在目為醫在耳為聾在背為拘急在腰為痿躄在脛為強直在足為腳氣千變萬怪不可名狀矣邪雖自外來其無毒者不入假如天行疫氣間有不病者天非私人非不居氣中是無毒也然則一也故仲景隨毒所在而處方由是觀之雖曰無因亦可是以吾黨不言因恐眩因失治矣後世論因其言多端不勝煩雜徒以惑人不可從焉治法治有四汗吐下和是也其為法也隨毒所在各異處方用之瞑眩其毒從去是仲景之為也如其論中所載初服微煩復服汗出如冒狀及如醉狀得吐如蟲行皮中或血如豚肝尿如皂汁吐濃瀉出之類是皆得其肯綮然焉者也尚書曰若藥弗瞑眩厥疾弗瘳可觀仲景之術三代遺法也今履其轍而嘗試之果無有不然焉者也於是乎吾知其不欺我矣然而世人畏瞑眩如斧鉞促疾病如子孫籲其何疾之除哉甚矣其惑之也禁宜人性之所好惡不同稱口腹者為宜不稱者為不宜古者養精以穀肉果菜未嘗言禁宜也後世嚴立禁宜曰某物增病某物勝藥也然其為物所奪者非藥也何以勝彼病之為哉立禁宜之弊至進其所惡禁其所好不亦左乎量數銖兩升斗古昔所用甚密矣雖然年世悠久不可得而審也如其概則可推知已先生乃有所考略此後世彼方一貼之重大率不下數兩今見華客來長崎者所用亦然此方有以一錢為一貼之説輕重僅出入此耳夫以殺性之藥作如此小劑且其煎煮之法不一而止再煮其滓服之何其治疾勝毒乎是故先生之教專守方書輕重必較多少必量如其再煮則古所無也故不為矣産蓐産蓐之法方士所習各殊其有害者除之無害者從之勿為收生家法所拘束焉恐反生它病已蓋産後困倦欲眠且臥而今京師俗數日戒之甚不可若血暈欲以參耆之劑防之妄矣宜審證治之又妊娠腹帶之法中華古無之本邦有之者世謂神功皇后徵韓妊娠擐甲故用之非常法也初誕初誕之法務去胎毒為主且不早與乳可也二三日為度若早與之其毒難去如朱蜜茯苓五香等何毒之逐不用而可至其有病者莫令綿延須急攻之今人動輒謂人之稟性古今自有厚薄今也薄矣故不勝攻擊也宜補之惡是何言哉夫人者與天地參焉天不裂地不壞何唯人之異哉雖草木亦然以今之藥攻今之疾何畏怖之有痘疹痘疹之證古籍不概見焉東漢初始有之本邦則聖武帝時云蓋天地人物無古今一也豈古有之者無於今今有之者無於古哉意者自古有之不傳其名已其為病也始與癰瘍無異矣治法亦以除毒排膿為主如補瀉二法則不知者之所立耳蓋見毒酷而死者也未見毒盡而斃者也其斃者是酷毒壅塞之所致也醫其詳諸攻補醫之於術也攻而已無有補矣藥者一乎攻焉者也攻擊疾病已內經曰攻病以毒藥此古之法也故曰攻而已精氣者人之所以生也可養以持焉養持之者穀肉果菜耳內經曰養精以穀肉果菜不曰之補而曰養古之言也蓋雖穀肉果菜乎猶且難補之而況藥乎豈人力之所能也哉故曰無有補矣後世並論攻補岐藥二之專為補氣之説曰病輕則攻之重則補元氣若強攻之元氣竭死夫藥者一乎攻焉豈得能補之哉元氣果可補則人為死妄誕特甚矣虛實夫正權衡而後輕重可較也審平常而後虛實可論也蓋人自有常焉失常然後有虛實矣於精氣謂之虛於邪氣謂之實何以言之內經曰邪氣盛則實精氣奪則虛夫精氣者人之不可無焉者也唯懼其虛故言之虛又言之奪邪氣者人之不可有焉者也唯懼其實故言之實又言之盛是故虛以養言實以攻言攻之者毒藥養之者穀肉此古之法也故虛實皆可由平常而論焉有人於此體甚羸弱所患最多問曰僕免身至今如此其患衆醫咸曰如爾此天質之虛症也病不可治矣若欲強治之其斃也必矣不若補以全生也乃以藥代飲食無一日廢之雖然尚仍舊子之所見亦如之乎願聞其説曰豈其然乎以余觀之子之所患是乃實也其人諤然曰子何言之妄瘦瘠如此加之以疴人咸為虛症何謂之實也曰籲何此之謂哉夫虛實者失常之名也於邪氣謂之實於精氣謂之虛子已有病何命以虛乎又豈得謂之天質乎哉是當其胚胎之初受疾而生精氣為其所抑壓而不能充暢者耳內經曰邪之所湊其氣必虛是也然則審其術以攻擊之飲食隨其嗜欲則病去而精氣自充暢矣夫然後肥瘠強弱是其性已於此乎可謂天質而已矣彼不由平常而論虛實也紛紛乎不知所適從矣故目不見其病唯羸弱是視遂名以虛症不亦謬乎是不正權衡而較輕重者也且夫所欲補之者非藥乎藥者偏性之毒物耳是以雖能拔邪氣而不能補精氣也若唯精氣之虛盍以穀肉養之彼既欲補不能也竟使人不免瘁爾懷疴以終其身也悲夫要之坐不辨其為失常之名焉耳矣又如謂氣虛腎虛脾胃虛之類亦率準之皆不因疾命名愆之所創焉刻斥醫斷凡例一是非者天下之公也此篇所述即吾儕二三子舉醫斷之説以質之先生先生髮蒙解惑徵諸聖言而是是非非一歸於公而止乃書以授弟子非敢與人爭衡亦出於授業施教之不得已也一此書初脫稿徒弟之外不許輕示人但恐謄寫致謬或失微旨故固請先生上諸桑梓以與同志傳之論辨簡易不用縟採辭達而已非敢告大方君子也一全篇凡四十三章將醫斷逐段附入彼則低寫於前此則高寫於後且欲省煩故抄彼文緊處而不舉其全覽者詳焉一此刻有病機診候未盡其歸趣者蓋所以不涉駁義則不論及也一本書可非者不在此限然不與大義者乃所不論也一各條不揭題辭以讀其論而義自見也旦就簡云門人和州足高恭謹識斥醫斷緒言余讀鶴氏所編吉益子醫斷廢書而嘆可為太息者三可為流涕者二其他背理而傷道者難遍舉矣夫醫雖小道其精理妙用非聖人不能肇修之也是以古今醫流雖有卓識俊才迥出於人者然其論辨取捨一皆折衷於經而終不能更其轍也人命所繫至重綦大豈可不慎哉而彼書也斷然擯醫經棄陰陽變古今不移之道而異其端矣嗚呼此言之行也後將不勝其弊矣可為嘆息者一也雖以仲景明敏猶質信於素問陰陽大論彼書雖稱取方於仲景然取捨任意加以妄説謂人參無補而治心下痞硬附子非溫而逐水氣然則仲景何不捨人參用枳實代附子以甘遂乎可謂無稽之言矣可為嘆息者二也夫政有王霸之別吏有循酷之異醫道亦然彼書論術甚率易分證尤忽略不求標本不究病因有攻而無補矣譬猶李斯商鞅之術郅都杜周之治如此而不敗者幾希也可大息者三也雖死生有命醫事所關亦大矣原治術之得法以回生與失宜以速死則可以知之矣吉益子謂死生者醫所不與也此言之弊終令庸愚者視人死如風花籲民病將疇依可為流涕者四也其最勝悲者初誕嬰兒不辨稟賦渥薄一切攻擊之施古今經法置而不論臆斷所是無少顧疑至痘疹之治慘刻益酷可不謂忍乎可為流涕者五也此五者誠足以為天下後世之患夫俗樂悅耳詭辨驚聽彼人之論亦取快一時而其實有不測之禍不可不辨也作斥醫斷古人謂醫為司命官者蓋本諸扁鵲之言是不知道者耳至誣扁鵲惑來學者莫斯為甚矣司命出周禮星名也扁鵲引而諭之思邈藉以名醫猶管子以穀米為民之司命孫子曰將者人之司命可以徵也聖人制醫藥以濟民夭死則借司命以名醫亦何不可之有哉誣扁鵲惑來學者為誰也可謂離蹤而跂訾者也死生者命也自天作之至醫焉能死生之哉死生有命出子夏之言顏子而夭盜跖而壽貴不能奪賤不得讓數盈運盡無奈之何此夫人所知何煩説之為然亦有不幸者有自取者王仲任所謂強弱壽夭之命所當觸值之命及正命遭命隨命等之説議論多端終難得其要領此即聖人所罕言也而況非聖者乎蓋煩説之必惑人輕言之則傷物言之有弊先賢慎焉夫惟忠臣烈士捨生而取仁犯難而踏義者臨時自斷曰死生命也則可已其他或為欲伐性因忿忘身者至其不可奈何乃亦曰命也此豈命哉乃自求也然亦自傷而止無害乎人矣惟刑官與醫者決不可言命也言必有害乎物焉何則醫與刑官皆與生殺之事者也平反則多活失入則多冤診應病而起方失法而斃片紙具案一匙藥劑殺無辜而折多壽莫斯可畏以生殺為重任畏之慎之猶恐得罪於造化而況一托之於命而謂己不與焉乎此非所宜言也又敢唱以導人乎若其説之行也庸醫凡工不論己術之粗妄人死則曰病吾除之死生命也醫不與焉黠者藉以為口實愚者信以為實然競為酸酷無復忌憚其禍豈可勝言也哉出言不善弊至於此凡為醫者所宜深察者也死生者醫之所不與也至執古之方體今之病能合仲景之規矩而死者命也質諸鬼神吾無愧爾天地大德曰生聖人為醫藥濟民夭死書稱天工人其代之周禮載凡民之有疾病者分而治之死終則各書其所以而入於醫師歲終則稽其醫事以制其食祿先王所以慎死生者至矣盡矣死生而醫不與則何為書死終以制食祿乎嗚呼契然無心於死生者非醫矣是以良工知幾微而治腠理故使良醫得蚤從事則疾可已也身可活也及其入膏肓也雖神醫無奈之何吉益子言死生者醫之所不與者蓋本諸扁鵲之言也然亦不知本者已扁鵲之言曰越人非能生死人也此自當生者越人能使之起耳此以未入骨髓者與既在膏肓者言之矣若使齊桓蚤從扁鵲之言則病可已也身可活也有病不治而死不可謂命也虢太子待扁鵲而蘇可以見也故使良醫蚤從事則病者或以愈且死或以生然世醫專以死生為己任者疑乎仁其失愚也言死生醫不與者疑乎知其失賊也愚與賊君子不由焉醫當以可治為可治以不可治為不可治何必言命耶治人病不愈而皆謂之命也豈理哉假令仲景當之我不信焉況不為仲景者乎況不合仲景之規矩者乎須徵諸聖人之言而後言命也不揣其本而齊其末方寸之木可使高於岑樓此之謂也世醫動輒預定其死生彼其意謂斃於吾手則害於名矣至死生醫之所不與也知人死生決嫌疑定可治醫之能事也古之道也工拙之所以分也何尤世醫之為哉彼既謂眂其死猶且盡我術以望其或生然而不生然後可謂命也已矣嗚呼視不可治而欲治之愚也古人不為之非為害於名治之無益也是扁鵲所以視桓侯之不可藥而逃去也其言忘死生於執刀圭之間闢諸操舟者言忘覆沒於楫棹之間豈可哉元氣之説聖人之所不言六經莫有焉至是豈可虛衰者哉亦可補乎哉元氣之説雖不具於六經其義則備焉吉子以名求之而不得輒謂六經莫有聖人之所不言可不謂昧乎物乎夫元者萬物之初是以易之教以元為大曰大哉乾元萬物資始至哉坤元萬物資生乃天地之大德所以生生不已者非氣而何也擊辭曰精氣為物祭義曰氣也者神之盛也在天為元在人為仁在人身為體之長矣孔子曰元者善之長也天非元無以運化乎萬物君非元無以運化乎天下人身非元無以運化乎四肢百骸也夫元原於天行於人通於萬物呼為統名此亦不外於天地自然者也彼曰是豈可虛衰者哉亦豈可補乎哉非也此氣衰則化育失時災害並至君不君臣不臣干戈爭起天地四塞禮記曰氣衰則生物不遂衰氣不可不益易曰損而不已必益故受之以益書曰燮理陰陽寅亮天地可見此元氣或時虛衰亦可以益之後以裁成天地之道輔相天地之宜天地之氣且可益況於人身哉孟柯曰氣體之充也苟得其養無物不長夫名定而實辨言正而義行彼妒繆於道而誘其所好也荀卿以為亂正名使民疑惑則謂之大姦豈可不慎哉若夫隨年齒而旺衰者天地之道萬物之常也至説者不論及此誤矣隨年齒而形與神旺衰者素問論之詳矣夫元氣之在全軀也徹上徹下無所不至此氣也分之則為陽為陰為精神生氣通天論曰其氣三是也有所抑遏而不流則為病所謂壯者氣行則已怯者則著而為病此非真氣之衰也氣不流有似乎衰耳所以不用補氣之藥反施耗氣之劑也內經所論陳言戴人所説亦不可不知焉豈説者不論及此乎彼適不思諸已人心之不同如其面也脈亦然至先證而不先脈先腹而不先證也古人以四診病自望始焉蓋診外及內也彼盩經旨反古法誰入不由戶其以人心之不同比脈之有異可謂非類矣若夫堯桀之心霄壤不啻也然其臂不為桀短不為堯長則脈亦豈天淵乎故曰以心比脈可謂非類矣扁鵲曰越人之為方也不待切脈望色聽聲寫形言病之所在可以見已扁鵲欲奇己術故張言以誇中庶子其不待切脈望色聽聲寫形者此誇張之言耳及其入診太子則曰陽脈下遂陰脈上爭此切脈也上有絶陽之絡下有破陰之紐破陰絶陽之色已廢此望色也及其聞耳鳴而鼻張循其兩股以至於陰則聽聲與寫形之診可謂詳且明矣鶴氏之子不能讀書漫引誇張之言以為之證可謂認影響失其實者已如留飲家脈千狀萬形或無或有不得而詳矣夫脈之不足以證也如此至自欺之甚矣醫其思諸留飲之脈或伏或見如結如散不可以名狀者此所以為留飲之脈也病怪則脈亦怪如沙脹邪祟有此病則有此脈怪病亦有屬飲者皆脈道窒礙所致已醫眩此而言脈不足以證者可謂執一廢百矣五十動代脈之説靈樞八十一難論之仲景亦謂動數不滿五十短期未知夫代者止歇不還之脈陽氣竭盡而氣脈不接續也至或如雀啄或如屋漏或如弦絶者與死為鄰也仲景曰得此脈者必難治所謂豫之短期也進退動數以見緩急輕重之候豈可謂無此理乎其他如傷寒心悸脈代者腹痛結澀止代者妊婦惡阻脈代及結促者阻滯去則脈復平不可一途而論之也至匿其病情令醫診之以驗其工拙則蘇東坡有論闢之慎疾者不可以不知焉腹者有生之本故百病根於此焉至宜取古法而求其要矣視疾之法背腹手足上下無所不診焉如仲景所謂結胸病正在心下按之則痛但滿而不痛者此為痞及按之濡按之石便按腹之法蓋為審也其寒熱虛實腎間丹田若夫里結硬糞可探而知焉則可以知病之狀也豈啻腹已哉如扁鵲循其兩股以至於陰可觀大表之間無所不診也周禮曰參之以九藏之動而不分腑也仲景未嘗論矣無益於治也至其説弗啻堅白要皆非治疾之用也甚矣哉吉益氏之解醫也以周禮不分藏府非醫書之言周禮之書非為治疾而設其言何一一盡醫理乎彼既不能以周禮治疾而以醫書治病則醫之言不可以不取則焉如吉氏謂藏府陰陽腎命門心包三焦之説無益於治而不取闢猶以眉發為無益於身而去之眉發在身身未必肥眉發去身身未必瘦而不去之者以具體不可缺也古人垂法正名豈但眉發之於身乎且仲景曰清邪中於上焦濁邪中於下焦又曰屬藏者攻之不令發汗屬府者不令溲數溲數則大便硬是等語皆緊要其他內經所論難經所辨暨千金外臺類於法品於治豈無益於治乎而言仲景未嘗論鹵莽殊甚十二經十五絡者至亦妄説耳不可從也扁鵲曰中經維絡別下於三焦膀胱又曰絶陽之絡破陰之紐此以經絡視病也夫經絡於人身也闢諸枰之有旄今以經絡為妄不取猶對無旄枰假令奕秋為之終不能善之也史曰必有經紀拙工有一不習文理陰陽失矣此方謂也本草曰某藥入某經某藏至其為牽強可以知已古法唯因上下表里所主而處方不同焉耳醫之用藥也猶將之用兵歟強弱安危之效死生起活之機不可輕也夫兵有正有奇馬步擇地弓刀異便多算勝少算不勝豈唯兵為然哉仲景之論醫也方法有經逆順異治機變不可窮也豈惟上下表里足以盡古法乎如張元素引經報使之説雖古無此説然仲景之方亦皆以桂枝麻黃髮太陽葛根解陽明柴胡和少陽及理中之理中焦白虎十棗承氣抵當均入胃而藥氣之所趨如鼓進金退左麾右指運諸掌上則有此甚於彼者至哉斯術出莫不以合法為本趣變為用苟反於法則安者危不知變則存者亡稽其聚散離合之際不可謂無入經入藏之理矣針灸之用一旦馳逐其病非無驗也至不必專用亦不拘經絡分數毒之所在灸之刺之是也針灸之有經紀內經之法古也扁鵲刺三陽五會仲景刺期門於太陽之縱及橫其它尸厥刺巨厥期門太陽少陽並病刺大椎及肝俞太陽病刺風池風府且灸少陰灸厥陰不一而止後世不敢易紀律而精術妙手出於其間者不鮮矣今滅法立違而實經絡分數於度外嗚呼弓矢不調則羿不能以中微六馬不和則造父不能以致遠此之謂也營衛者氣血之別稱也至非疾醫之用也不可從也營衛者水穀精悍之氣也不可直指為氣血之別稱也蓋運行一身經脈之中外如經營衛護然也爪之生發之長營衛之行無少間斷均是氣血也運行者曰榮衛盈滿者曰氣血猶水之與流也如謂流是水之別稱豈理也哉故仲景之書有並稱榮衛氣血者可以徵焉也或榮衛和則愈或榮衛強弱榮衛不能相將三焦無所仰等語皆切於治者也彼言非醫之用也不思諸甚矣夫陰陽者天地之氣也無取於醫矣至非唯無益於治反以惑人學者思諸夫天者氣而不質地者質而不氣人則氣質合焉氣陽也質陰也此人身陰陽顯然者也彼吉益子者體不具陰陽則已然彼既謂今天地即古天地人物亦然如果不具陰陽則人物亦非古之人物也何言之相矛盾乎陰陽之於醫事古人規則莫外於此豈可悖焉哉扁鵲謂以陽入陰所以治虢太子也仲景曰陽不足陰不足陽結陰結陰陽會通陽去入陰所以治本陰陽也若或置陰陽而不論偶一得功亦是詭遇已何足尚也夫朱丹溪張介賓之論所見各偏矣所以名不正而言不順也已五行之説已見虞書及洪範至吾黨所以不取也後人增演其説以誇窮理可謂無用之徒也已醫書以五行配五藏以辨其用與其位其來也尚矣猶周禮官府之六屬以天地四時配之五行氣也故曰行人亦稟天地之氣以生故以氣配之仲景曰夫天布五行以運萬類人稟五常以有五藏五者並行而不相悖者亦唯醫之教為爾如周禮食醫春多酸夏多苦秋多辛冬多咸調以滑甘是以五味配之也又大卜所謂各以其方之色與其體辨之亦可以徵也五行出尚書配當之義見易高明配天搏厚配地此亦可並思也若夫拘束地上五物及生克勝復之理者不足與言治矣五運六氣者無驗於病也考司天在泉至要是陰陽家之言奚取疾病醫乎運氣司天在泉之説無益於治療而有誤乎來學疾病之嬰人身豈可推司運而預期哉況又非內經之原文乎齊褚彥通明王安道繆希雍既辨之可謂英斷也然如周禮疾醫春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾及內經陰陽應象論等説醫所當知也世之好言理者必物推事窮至其所不通鑿以誣蓋理本非可惡者也惡其鑿焉耳至蓋事理相依不離者也故事為而得之理默而識之孟子曰所惡於智者為其鑿也如智者若禹之行水也則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣醫之為術亦如此也惟理無形以順為形禹之行水亦唯順是行今棄理而臨疾又言不論其所以然者所謂盲人騎瞎馬半夜臨深池籲危焉哉醫意之説一出而世之狡兒以為口實至豈得不差乎學者思諸夫醫之術也出於法而入於意得於手而應於心故其精微之極有不可以言者也苟意之不周惡能至精微乎易曰精義入神以致用也利用安身以崇德也惟舊典可博涉機變則不可預論思之不置神將通也居今之世為古之工唯意與法已醫而不用意奚知其可仲景曰伏氣之病以意候之此於四診之外更示人以意候之法也醫意之説其來也有據矣夫世醫以痼疾名持病而難乎治矣至如中風嗝噎脹滿痿躄等難之益甚方不得法也止此非入門同道不易論焉醫之治痼病也瞑眩攻擊或可除之然猶視其元氣如何況其痼之久也雖良醫不能拔而去之而彼庸醫者欲必除之盡力以攻之病未去而人斃中風嗝噎脹滿痿躄之病未入膏肓者何治而不愈之有其已入骨髓者雖盧扁亦不能治焉其方法與治術可學而知可思而得余亦有病論治驗見所著醫叢不贅於茲素靈二書古人以為先秦之偽作至難經傳以為越人書也而其言理最勝故害道亦多考之扁鵲傳亦唯偽作而已內經之為書不知出於何人之手亦無古文可以徵焉祗古人質朴編述多不書姓字如尚書論語國策等不命其所編後來無復識別內經之書劉向程頤宋濂以為戰國之文不過以其地名官稱言之耳蓋上世作醫藥以救夭死其術與法人以傳人後恐失其傳書以傳焉家異法人殊書故漢書有黃帝白氏扁鵲內外經今之存者黃帝內經已其白氏扁鵲及外經者不可見不亦遺憾乎而於今可見古義者獨賴此書之存雖秦和越人倉公張機亦無能逾其矩度學者豈可不思哉彼既非內經又言有可法不免首鼠兩端八十一難以扁鵲傳不載之為偽作何考之疏乎秦漢以降天下言脈者無不皆賴此書故扁鵲傳曰至今天下言脈者由扁鵲也彼亦兩手診脈按腹斷病則居此書之術中而不自知可謂徙宅忘妻矣難經訣診於寸口候氣於腎間也其度越前古獨步後來者照照乎誰出其範圍乎而彼言害道且非扁鵲書夫誣扁鵲惑來學者莫斯為甚矣本草妄説甚多不足以徵也至後世服食家説攙入本經不可不擇焉諸家本草博採衆説旁及道家方士之言而龐雜無統也醫當擇之明白的實不眩邪説自試有效瞭然自得而後用以治疾也古云工欲善其事必先利其器苟器不利而事善者未之有也屑屑神仙延年虛妄之説者豈可與論醫焉哉修德氏已辨之余亦稽古徵今撰本草筌欲以告同志後世修治之説甚煩至蓋毒即能能即毒制以益毒則可殺毒則不可矣仲景之法有㕮咀者各別搗者臼中杵之者且鉛丹香豉出於製造麻沸甘爛異於煮法均皆修治也豈可厭煩乎雖本草家之法多難遵用然砒石制以益毒膠皮製不減能況炮炙洗燒各適其可則亦似乎未可全擯斥之也學者思諸相畏相反之説甚無謂也至其它亦可以知已古人制方也妙義精術試諸千載之下見奇奏效應驗合轍蓋品味和調則桴鼓影響不啻也若夫處劑失法則非徒藥不靈過端已萌於此凡物之決然畏滅者蟹膏消漆枳椇化酒羚羊能碎金剛胡桃亦割鐵錢豈只是已哉磁石引鐵琥珀拾芥及彩也染也飪也得法而出色失和則損味其餘相畏相反相宜不可勝數也譬如賢佞不相容寬猛難並行何曰甚無謂也藥者草木偏性者也偏性之氣皆有毒以此毒除彼毒耳至煉煆服食以誤其身者多矣悲夫以毒除毒猶以兵攻兵耶然兵有攻有守或奇或正及虛及實避鋭氣擊惰歸知節勢審動靜途有所不由軍有所不擊全國為上破國次之百戰百勝非善之善者也唯醫亦然虛虛實實緩急成敗唯法是依唯機是察治法必以除毒一法非善之善者也諸家本草所説藥能率多謬妄至今舉本草所載不合仲景者一二如人參治心下痞硬而彼以為補氣石膏已渴而彼以為解熱附子逐水氣而彼以為溫寒其相齟齬者大抵為爾甚矣哉吉益子之好奇也君子一言以為知一言以為不知何其言之疏且妄也仲景未嘗言人參非補治痞硬附子非溫逐水氣可謂誣也今舉其一二以證之傷寒論太陰篇曰自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩又少陰病脈沉者急溫之宜四逆湯又發汗病不解反惡寒者虛故也芍藥甘草附子湯主之又曰附子溫經及下利清穀裡寒者四逆湯主之如是則附子非溫而何也其甘草附子湯桂枝加附子湯真武湯等方中有附子而利水氣者乃溫中運走之餘力耳非本分之能也如代赭石湯瀉心湯之屬治心下痞硬亦猶是已非人參之能而黃連代赭重墜苦寒之力也如桂枝人參湯治痞硬則為表裡不解數下之而裡氣大虛而設也痞不待治而治者乃人參補正之餘功已且通脈四逆湯下云利止脈不出者加人參一兩發汗後身疼痛脈沉遲者人參新如湯主之霍亂篇曰惡寒脈微而復利四逆加人參湯主之霍亂寒多不用水者理中湯主之臍下悸者用人參長沙氏以人參為補照照乎不傒辨也石膏治渴以解熱也熱之不解惡能已渴如厥陰篇云傷寒脈滑而厥者里有熱也與白虎湯三陽合病自汗出者白虎湯主之此條不曰渴也其它治渴者有五苓柴胡豬苓承氣等法豈石膏而已哉鹵莽滅裂不顧紕漏遂爾排擊世醫建立門戶自是而非人如此者豈能合仲景之規矩耶可謂扁蝠挂軒笑人之倒行已藥産有某土宜處某土不宜處某土之所生性之所稟不可不詳也橘逾淮為枳雞舌不産倭華及韓參之甲天下也實土宜之異産地方之界物哉醫不可不辨識也彼已言詳其土宜而舍韓參為非用倭參為能前言而後反嗟蜂也口甚甘尾乃毒學者勿愛其甘而受其螫人參有數種今見清韓賈舶所載來者皆非古也至今用之心下痞硬不治和參能治之是其由製造可以知也人參之品類雖多而以朝鮮産為上方今此邦治化隆盛四方交易無物不到焉往年朝鮮貢人參實官園種之於是此邦有韓參實濟民之仁澤也哉余嘗得其實而種之花實根形與本草説相符取此證彼則韓舶所載來者真贋可辨製造可分何容賈豎欺乎蓋人參功力豈徒止治心下痞硬哉此物大力破堅積治痞硬亦唯補正運化之餘力已不然則漢以降醫方之言豈無驗而言之乎彼獨造不經之説於千載之下譏誣古人簸弄來學此坐於不知土宜與淺人參是也方者莫古於仲景而仲景為傳方之人非作方之人也至亦唯暗投暝行也已學者思諸仲景之論法設方明白精正千載一人於斯為盛以至後世肘後千金外臺等傳方之書所祖述所取則也而仲景以前無方之可見無論之可證也故褚澄曰漢以前有説無方漢已後有方無説而彼以為傳方之人非作方之人也且言雖仲景亦或有不解者此有何所見何所徵而言之邪肆口之甚一至於此也可謂妄矣夫世俗所謂名方者間有奇效故醫傳之非醫者亦傳之至宜博求普問以輔其術矣本邦醫俗傳稱名方者蓋本邦上世之遺方歟抑俗間驗而傳之也未可知焉間有奇效者醫當求以輔其術非無裨補也宋御局所輯者亦如是已彼若知之則何取方仲景之一書悉舍後世方而不取反俗方是問之為哉可謂貂不足狗尾續已仲景書有傷寒雜病論金匱要略玉函經共論傷寒及雜病甚詳悉焉然要略玉函偽撰已至其理鑿者其説迂者一切不取之所以求其本色也傷寒雜病論仲景手録書已亡矣今之存者晉王叔和所詮次非復長沙之舊也稱金匱玉函者按文獻通考至於宋王洙得於蠹簡中蓋蠹余書豈莫錯簡闕誤然微言方略多存於其書則可不徵諸江南諸師祕仲景要方者見千金夫曰玉函曰金匱皆後世美稱已非舊名也故仲景自序曰作作寒雜病論十六卷未嘗曰作玉函金匱千全亦稱要方都是一書宋時始分為二書去玉函二字單名金匱要略蓋其雜病論也今坊間所刻玉函經清陳世杰偽撰以欺夫小子亡識人已彼言理鑿者説迂者一切不取之何不別著一書而論之而作此兩端之説以惑來學哉傷寒論六經非病在六經也假以為紀也已及其施治也皆從證而不拘焉至皆非矣不可從也扁鵲曰疾之居腠理也湯尉之所及也在血脈針石之所及也其在腸胃酒醪之所及也在骨髓雖司命無奈之何仲景論傷寒亦猶是已其序六經之病則不可易也趙繼宗作邪説戴思恭有異論而後及本邦後藤氏大造畔正之説設淺深閉脫以變亂之然其説至合病並病而窮矣趙嗣真曰仲景之書一字不同則治法霄壤讀者其可不於片言隻字以求其意歟不達其意者悖師而惑於所見也已彼書所論大氐不出於後藤氏之糟粕實慕商鞅變法襲李斯故智哉後世以病因為治本也曰不知之焉得治豫嘗學其道恍惚不可分雖聖人難知之已至雖曰無因亦可是以吾黨不言因恐眩因失治矣後世論因多端徒以惑人不可從焉醫病求因治術要領古之法也素問曰治之極於一一者因得之又曰治病必求其本今以傷寒之一事證之仲景曰本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之此太陰之見症而用太陽本病藥非治因而何也其它病發於陽而反下之熱入因作結胸本是霍亂今是傷寒本虛本不虛是本病及某經傷風某經傷寒等語無往而非求因也彼今舉桂枝湯柴胡湯白虎湯通治之例而言無求因何術之粗邪此所謂醫不執方合宜而用者如珠走槃如槃走珠無不可者也在金匱曰短氣有微飲者當從小便去之桂苓朮甘湯主之腎氣丸亦主之病溢飲者當發其汗大青龍湯主之小青龍湯亦主之此所謂貴活法也不言因者傷寒論中雖一二有之亦精求其意則不可謂無因也若夫不求因而治病必敗之道也豈可僥幸十一於千萬以取必敗之禍哉傳云皮之不存毛將安附焉籲危矣哉治有四汗吐下和是也其為法也隨毒所在各異處方用之瞑眩其毒從去是仲景之為也至甚矣哉其惑之也治法以汗吐下和為限者張戴人之糟粕而後藤氏之唾餘已仲景之設法也豈徒四而已哉有溫經者有溫里者或利小便或救里治中州則曰建曰理治厥則為四逆為通脈攻心胸有陷胸瀉心之分或止利去黃刺者灸者與水者不與者及內藥於鼻中者諸禁汗吐下者觸類而長之則何所不有之有乎其它後世治術可取法者猶多焉以四者限之術亦拙哉人性之所好惡不同稱口腹者為宜不稱者為不宜古者養精以穀肉果菜未嘗言禁宜也至不亦左乎古人設禁忌甚嚴矣傷寒論桂枝湯方後云禁生冷黏滑肉面五辛酒酪臭惡等物又烏梅丸下云禁生冷滑物臭食等其餘各方下云將息及禁忌內經所論千全外臺所序慎房室戒口腹且聖人鄉黨之教何言古者未嘗言禁宜也作此諛言取容於世可謂陋矣銖兩升斗古昔所用甚密矣雖然年世悠久不可得而悉也及夫以殺性之藥作如此小劑至故不為也度量衡三者聖人所制經濟所先古今沿革史書可以徵也豈為不審耶此書舉二而失一亡乃不可歟醫若不詳之則今古方藥分數何由準之夫度量衡之原以秬黍起數見漢書本邦之制大抵從唐朝制據杜氏通典度量衡三倍於漢以本邦今通行者考之大抵衡三倍於漢量十倍於漢度以貨泉大為一寸醫當由此準之出入和劑以彼準此依物作證何不詳之有李時珍曰今古異制古之一兩今用一錢可也古之一升即今二合半也此亦以明稱量準漢制者歟凡古之方藥劑大而服小以傷寒外臺千金等疾差停後服不必盡劑或服不盡劑服一劑盡病證猶在者更作服等語而可知也故內經曰能毒者以厚藥不能毒者以薄藥此劑之輕重因病為之也余有考證附醫叢中彼曰殺性之藥作如此小劑不經殊甚不勝捧腹産蓐之法方土所習各殊至若血暈欲以參耆之劑防之妄矣宜審證治也又妊娠腹帶之法中華古無之云云非常法也臨蓐之法醫所當審密看察也豈可必效習谷乎産後血暈必要參蓍庸醫所為守株刻舟之屬已産帶之法雖華人有之為初胎設不聞如此邦産帶習為常而其法亦差異奚囊便方曰初胎四五個月前後用軟絹或帛闊七八寸自背纏至腹以針線縫住如兜肚樣晝夜不解倘胎長大覺胸中有氣急狀方可線三分或五分不可滿寸漸以調之則肌肉有所束縛不使胎長極大便於産也此方不特宜於初胎者雖慣胎亦可知非通行者也吾門亦有産帶法産後枕法不贅於此初誕之法務去胎毒為主如朱蜜茯苓五香等何毒之遂不用而可至夫人者與天地參焉天不裂地不壞何唯人之異哉雖草木亦然以今之藥攻今之病何畏怖之有初生醫法千金方有拭法以拭取舌上惡血甘草湯吐去心胸中惡汁朱蜜法定神止驚其它準繩有黃連湯活幼方有黃連甘草拭法直指方茯苓丸以枳殼黃連治氣短腹滿非茯苓為下胎毒也豈待辨之千金朱蜜法彼謂為逐毒非也五香湯出千金聖濟總録御局等癰疽諸瘡之方也本邦醫俗以為胎毒之藥滷妄之甚當辨正而禁之夫人者與天地參確乎聖人之言也哉而彼已以陰陽五行為外物此何其言之大相徑庭哉天地之氣有盛衰草木有苗而不秀人生亦有稟賦強弱是乃所以與天地參耳彼已作天不裂地不壞之言不論嬰兒強弱一切攻擊又何畏怖之有豈是仁人之用心哉痘疹之證古籍不概見東漢初始有之至始與癰瘍無異矣治法亦以除毒排膿為主如補瀉二法則不知者之所立耳蓋見毒酷而死者也未見毒盡而斃者也其斃者是酷毒壅塞之所致也痘疹治法大要與癰疽無異者薛立齋之言也又曰宜辨表裡虛實寒熱蓋表虛而用發表之劑輕則斑爛重則不能起發而死裡實而用托裡之劑輕則患痘毒重則喘息腹脹而死裡虛而用疏導之劑輕則難以貫膿結痂重則不能結靨落靨而死治法豈可不慎哉若果除毒一法為能治痘治亦易易哉可謂古今小方脈牛刀割雞長殳刈薺豈其然也哉況起發灌膿結痂三者皆賴脾胃榮養何可妄投克伐之除毒以招夭柱乎夫痘疹為嬰孩保生第一關隘也術豈可若斯粗哉魏桂岩順逆險三法及錢仲陽陳文中之論雖各有得失亦後昆所取則其它博問審尋不可敢恣是古者醫學之所以分科習業貴乎精專也醫之於術也攻而已無有補矣藥者一乎攻焉者也攻擊疾病已至元氣果可補則人焉死妄誕特甚矣語曰一言而可以興邦有諸一言而喪邦有諸孔子曰言不可以若是其幾也彼吉子者欲以攻之一言盡醫之術妄亦甚矣夫事物之理勢二曰利曰害而利或生害害亦生利凡人身所患唯邪盛正虛耳攻之去邪將大利於人身者也然圖之不審害旋隨之惟攻可攻於可攻之時則利攻不可攻於不可攻之時則害用舍有宜張弛異勢而彼不辨虛盛曰攻而已籲玉石俱焚良姦同陷此存亡之樞機不可不察也故善醫者先料內以攻外不逐末以損本然後安平可保大邪可除今不辨虛盛惟一於攻攻罷即敗不保其勝恐非疾醫之良算也如能知邪正利害之際可攻而攻之可撫而撫之庶幾不誤乎興喪安危之數矣夫正權衡而後輕重可較也審平常而後虛實可論也至又如調氣虛腎虛脾胃虛之類亦率準之皆不因疾命名愆之所創焉以尩羸言虛實者猶以皮相分賢愚凡庸之見已今以羸弱立虛實論設羸弱實以證虛實醫主天稟謂之虛彼主失常謂之實不知指物不能正名皆非也又欲實其説而引內經邪之所湊其氣必虛若內經言其氣必實則可也欲證實而反引虛實不知而諤然醫不知而默然彼亦不知而妄言豈可不笑哉以氣虛腎虛脾胃虛為愆之所創焉以余觀之猶作環舞者宮室皆轉瞰回流者頭目自拖非宮室之幻惑也人自惑之非回流之改變而人自變之彼以攻一言斷醫之道主見證而希速效終乃畔理傷道猶硜硜然欲果於行危矣哉聖人言曰無欲速無見小利欲速則不達見小利則大事不成信也哉此言學者可不慎焉矣夫題斥醫斷後近世香川子首倡儒中之醫傲然曰自我作古則廢古來醫説以解其拘攣排擊世醫以破其盲瞶也直截痛快莫甚於此云世醫小有才之輩遽喜其新奇妄謂千古不傳之祕者殊不知議論之激矯而過正好奇之甚稍涉偏僻其究弗使庸醫恣而自用其意妄而輕試其毒者幾希嗟呼流弊之至賊夫人之子者不亦悲哉頃吉益氏門人鶴生作醫斷則全然香子之説剿以為己有稍換其字或微變其意左支右吾敷衍成篇其他一二異見飾以師説而務立其門戶以稱卓然自信者亦唯殺機之存心不覺口自出乃至曰死生者醫之所不與而極也其少恩而慘礉雖香子之勇哉殆足以寒其膽者也則儒中之醫於是乎終臻其極矣此雖其人奇癖乃爾細究其病根則香子之藥無乃瞑眩乎不則長沙之靈為之祟者非耶何其慘毒嗚呼儒中之醫而有斯弊不亦怪乎吉子之才而墜其唾餘何其不悟而況鶴氏之子白麵醫生學而未試其藥不售終日兀坐與書為仇剿襲剽竊弄筆遣悶亦其中不能自信特大言欺人耳此輩鹵莽何足論哉豫嘗作斯論以評一子者久之雖然辨之不得已掎齕逼人頗闕遜讓之義云則未嘗舉而語之人也吾友新甫子好學之醫也其術大行於世而行余之文亦不堪技癢著書以見示則斥醫斷也力排吉子攻擊之殷不遺餘力因又命豫跋以請掎角之援云不亦甚哉順也怯懦豈奮於掎角者乎無已則曩者之論歟雖一矢加遺哉強弩之末何援之有新甫子則扼腕曰吾子偏師攻香子吾全軍擊吉子乎掎角之勢莫熾於此云爾則亦何其狂且近於戲謔也不覺相視大笑尚且左手捧腹右手揮毫因書之卷末亦豈跋云乎哉聊與新甫子相戲而已籲甚矣吾黨之狂也赧顏投筆而走云寶曆壬午春三月平安醫士法眼武川幸順撰
